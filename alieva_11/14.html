<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блокировка поля</title>
    <script>
        function agreeForm(f) {
            if (f.agree.checked)
                f.submit.disabled = 0;
            else
                f.submit.disabled = 1;
        }
    </script>
</head>
<body>
    <form>
        <p><textarea cols="30" rows="4" disabled>Типовой договор
Отдаю свои душу, а взамен получаю здоровье и бессмертие.</textarea></p>
        <p><input type="checkbox" name="agree" onclick="agreeForm(this.form)"> Я согласен со всеми условиями</p>
        <p><input type="submit" name="submit" value="Далее" disabled></p>
    </form>
</body>
</html>
