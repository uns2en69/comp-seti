<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввод числа</title>
</head>
<body>
    <form>
        <p>Введите число от 1 до 10:</p>
        <p><input type="number" size="3" name="num"
            min="1" max="10" value="1" step="0.5" />
        </p>
    </form>
</body>
</html>
