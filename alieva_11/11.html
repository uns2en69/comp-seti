<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Телефон</title>
</head>
<body>
    <form>
        <p>Ваше имя: <input name="login" /></p>
        <p>Телефон в формате 2xxx-xxx <input type="tel" name="tel"

        <p><input type="submit" value="Отправить" /></p>
    </form>
</body>
</html>
