<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>border-radius</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="block r-1">border-radius: 50px 0 0 50px;</div>
    <div class="block r-2">border-radius: 40px 10px;</div>
    <div class="block r-3">border-radius: 13em/3em;</div>
    <div class="block r-4">border-radius: 13em 0.5em/1em 0.5em;</div>
    <div class="block r-5">border-radius: 8px;</div>

</body>
</html>
