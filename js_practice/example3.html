<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пример 3</title>
</head>
<body>
    <p id="myParagraph">Нажми на кнопку</p>
    <button id="myButton">Кликни меня</button>

    <script>
        // Находим абзац и кнопку
        let paragraph = document.querySelector('#myParagraph');
        let button = document.querySelector('#myButton');

        // При клике на кнопку меняем текст и цвет
        button.onclick = function() {
            paragraph.textContent = 'Клик сработал!';
            paragraph.style.color = 'blue';
        };
    </script>
</body>
</html>
