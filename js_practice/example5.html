<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор суммы</title>
</head>
<body>
    <h2>Калькулятор суммы</h2>
    
    <input type="number" id="chislo1" placeholder="Введите число">
    <br><br>
    
    <input type="number" id="chislo2" placeholder="Введите число">
    <br><br>
    
    <button onclick="slozhit()">Сложить</button>
    
    <p id="rezultat"></p>
    
    <script>
        function slozhit() {
            // Получаем значения из полей и преобразуем в числа
            let a = Number(document.getElementById('chislo1').value);
            let b = Number(document.getElementById('chislo2').value);
            
            // Складываем
            let summa = a + b;
            
            // Выводим результат
            document.getElementById('rezultat').innerHTML = 'Сумма = ' + summa;
        }
    </script>
</body>
</html>
