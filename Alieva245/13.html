<!DOCTYPE html>
 <html>
 <head>
  <meta charset="utf-8">
  <title>Порядок полей в форме</title>
  <style>
 </head>
 <body>
    fieldset {
    width: 200px; /* Ширина */
    padding: 0 10px; /* Поля */
   }
   fieldset:nth-child(odd) {
    float: left; /* Обтекание для всех нечётных элементов */
   }
  </style>
 </head>
 <body>
 <form>
  <fieldset>
   <p>Имя:</p><input name="name" tabindex="1"></p>
  </fieldset>
  <fieldset>
   <p>Фамилия:</p> <input name="lastname" tabindex="3"></p>
  </fieldset>
  <fieldset>
   <p>Телефон:</p><input name="tel" type="tel" tabindex="2"></p>
  </fieldset>
  <fieldset>
   <p>Пол:</p> <select name="gender" tabindex="4">
    <option selected>Мужской</option>
    <option>Женский</option>
  </select></p>
 </fieldset>
</form>
</body>
</html>
