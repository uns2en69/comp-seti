<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица</title>
</head>
<body>
    <h1 align="center">Collapse</h1>

    <table border="1" align="center" width="700" cellpadding="10" cellspacing="0">
        <tr>
            <th>Модель</th>
            <th>Производитель</th>
            <th>Цена</th>
        </tr>

        <tr>
            <td>Lumia 950</td>
            <td>Microsoft</td>
            <td>29.000</td>
        </tr>

        <tr>
            <td>iPhone 6s</td>
            <td>Apple</td>
            <td>52.000</td>
        </tr>

        <tr>
            <td>Nexus 6P</td>
            <td>Huawei</td>
            <td>49.000</td>
        </tr>
    </table>

    <h1 align="center">Separate</h1>

    <table border="1" align="center" width="700" cellpadding="10" cellspacing="0">
        <tr>
            <th>Модель</th>
            <th>Производитель</th>
            <th>Цена</th>
        </tr>

        <tr>
            <td>G 5</td>
            <td>LG</td>
            <td>44.900</td>
        </tr>

        <tr>
            <td>HTC 10</td>
            <td>HTC</td>
            <td>49.900</td>
        </tr>

        <tr>
            <td>Nexus 5X</td>
            <td>Google/LG</td>
            <td>25.000</td>
        </tr>
    </table>
</body>
</html>
